<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Issue Ticketing - GlobalSolutions</title>
</head>
<body>
    <header>
        <h1>GlobalSolutions - Session Issue Ticketing</h1>
    </header>
    <main>
        <section class="form-container">
            <h2>Report an Issue</h2>
            <p>Use this ticketing system to log issues encountered during your session. This protects your quality score.</p>
            <form id="issue-ticket-form">
                <label for="session-id">Session ID:</label>
                <input type="text" id="session-id" placeholder="e.g. SESS-8472" required>
                
                <label for="machine-id">Machine (if applicable):</label>
                <input type="text" id="machine-id" placeholder="e.g. RDP-07">
                
                <label for="issue-type">Issue Type:</label>
                <select id="issue-type" required>
                    <option value="connectivity">Connectivity / RDP Drop</option>
                    <option value="platform">Partner Platform Error (Handshake / Outlier)</option>
                    <option value="auto-lock">Wrongful Auto-Lock</option>
                    <option value="other">Other</option>
                </select>
                
                <label for="description">Issue Description:</label>
                <textarea id="description" rows="5" required></textarea>
                
                <button type="submit">Submit Ticket</button>
            </form>
        </section>
        
        <section class="ticket-history">
            <h2>My Active Tickets</h2>
            <table>
                <tr>
                    <th>Ticket ID</th>
                    <th>Session ID</th>
                    <th>Status</th>
                    <th>Submitted</th>
                </tr>
                <tr>
                    <td>TKT-1029</td>
                    <td>SESS-8472</td>
                    <td><span class="status-review">Under Review</span></td>
                    <td>June 2, 2026</td>
                </tr>
            </table>
        </section>
    </main>
</body>
</html>
